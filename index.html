<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>变量城夜巡</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">都市异常轻肉鸽 RPG 原型</p>
          <h1>变量城夜巡</h1>
        </div>
        <div class="hud" aria-live="polite">
          <span>生命 <strong id="hpValue">100</strong></span>
          <span>等级 <strong id="levelValue">1</strong></span>
          <span>经验 <strong id="xpValue">0/8</strong></span>
          <span>bug点数 <strong id="bugValue">0</strong></span>
          <span>武器 <strong id="weaponValue">未选择</strong></span>
          <span>反噬 <strong id="backlashValue">0%</strong></span>
          <span>已处理 <strong id="fixedValue">0/7</strong></span>
        </div>
      </header>

      <section class="stage">
        <canvas id="gameCanvas" width="1280" height="720"></canvas>

        <div class="chapter-status" aria-live="polite">
          <span id="chapterTitle">第一章：夜班断点</span>
          <strong id="objectiveText">调查办公室异常</strong>
        </div>

        <aside class="run-panel" aria-live="polite">
          <div id="chapterPips" class="chapter-pips"></div>
          <div class="run-grid">
            <span>档案 <strong id="archiveValue">0/5</strong></span>
            <span>构筑 <strong id="buildValue">初始</strong></span>
            <span>共鸣 <strong id="resonanceValue">无</strong></span>
            <span>击破 <strong id="defeatValue">0</strong></span>
          </div>
        </aside>

        <aside id="storyPanel" class="story-panel hidden" aria-modal="true">
          <div id="storyAvatarFrame" class="story-portrait" aria-hidden="true">
            <img id="storyAvatar" alt="" />
            <span id="storyAvatarFallback">安</span>
          </div>
          <div class="story-dialogue">
            <div class="story-meta">
              <p id="storySpeaker" class="event-kicker">安渡</p>
              <span id="storyProgress"></span>
            </div>
            <h2 id="storyTitle">凌晨 03:32</h2>
            <p id="storyText"></p>
            <p id="storyContinue" class="story-continue">点击继续</p>
            <div id="storyChoices" class="choice-grid"></div>
          </div>
        </aside>

        <aside id="eventPanel" class="event-panel hidden" aria-modal="true">
          <p id="eventKicker" class="event-kicker">异常弹幕</p>
          <h2 id="eventTitle">同事头顶冒出弹幕</h2>
          <p id="eventText"></p>
          <div id="eventChoices" class="choice-grid"></div>
        </aside>

        <aside id="upgradePanel" class="event-panel hidden" aria-modal="true">
          <p id="upgradeKicker" class="event-kicker">变量祝福</p>
          <h2 id="upgradeTitle">选择一个升级方向</h2>
          <div id="upgradeChoices" class="choice-grid"></div>
        </aside>

        <aside id="resultPanel" class="event-panel hidden" aria-modal="true">
          <p id="resultKicker" class="event-kicker">今日结算</p>
          <h2 id="resultTitle"></h2>
          <p id="resultText"></p>
          <div id="resultStats" class="result-stats"></div>
          <button id="restartButton" class="choice-button primary">重开夜巡</button>
        </aside>
      </section>

      <footer class="ticker">
        <span id="logLine">凌晨 03:32，安渡从键盘上醒来。</span>
      </footer>
    </main>

    <script defer src="./src/data/game-data.js"></script>
    <script defer src="./src/main.js"></script>
  </body>
</html>
