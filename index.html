<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>变量城夜巡</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">都市异常轻肉鸽 RPG 原型</p>
          <h1>变量城夜巡</h1>
        </div>
        <div class="hud" aria-live="polite">
          <span>生命 <strong id="hpValue">100</strong></span>
          <span>等级 <strong id="levelValue">1</strong></span>
          <span>经验 <strong id="xpValue">0/8</strong></span>
          <span>bug点数 <strong id="bugValue">0</strong></span>
          <span>武器 <strong id="weaponValue">未选择</strong></span>
          <span>反噬 <strong id="backlashValue">0%</strong></span>
          <span>已处理 <strong id="fixedValue">0/7</strong></span>
        </div>
        <div class="system-actions" aria-label="系统操作">
          <button id="pauseButton" class="system-button" type="button">暂停</button>
          <button id="settingsButton" class="system-button" type="button">设置</button>
          <button id="fullscreenButton" class="system-button" type="button">全屏</button>
          <span id="inputHint" class="input-hint">键鼠</span>
        </div>
      </header>

      <section class="stage">
        <canvas id="gameCanvas" width="1280" height="720"></canvas>

        <div class="chapter-status" aria-live="polite">
          <span id="chapterTitle">第一章：夜班断点</span>
          <strong id="objectiveText">调查办公室异常</strong>
        </div>

        <aside class="run-panel" aria-live="polite">
          <div id="chapterPips" class="chapter-pips"></div>
          <div class="run-grid">
            <span>档案 <strong id="archiveValue">0/5</strong></span>
            <span>构筑 <strong id="buildValue">初始</strong></span>
            <span>共鸣 <strong id="resonanceValue">无</strong></span>
            <span>击破 <strong id="defeatValue">0</strong></span>
          </div>
          <div id="openingTracker" class="opening-tracker hidden"></div>
          <div id="hookTracker" class="hook-tracker hidden"></div>
          <div id="tempoTracker" class="tempo-tracker hidden"></div>
          <div id="starterTracker" class="starter-tracker hidden"></div>
          <div id="deviceTracker" class="device-tracker hidden"></div>
        </aside>

        <aside id="startPanel" class="start-panel hidden" aria-modal="true">
          <div class="start-copy">
            <p class="event-kicker">夜巡档案</p>
            <h2>变量城夜巡</h2>
            <p id="startSummary"></p>
          </div>
          <div id="tonightHook" class="tonight-hook" aria-live="polite"></div>
          <div id="startStats" class="start-stats"></div>
          <div id="echoArchive" class="echo-archive" aria-live="polite"></div>
          <div class="starter-builds" aria-live="polite">
            <div class="starter-builds-head">
              <div>
                <p class="event-kicker">开局流派</p>
                <h3>30 秒进入爽点</h3>
              </div>
              <strong>推荐</strong>
            </div>
            <div id="starterBuilds" class="starter-build-grid"></div>
          </div>
          <div class="meta-progress" aria-live="polite">
            <div class="meta-progress-head">
              <div>
                <p class="event-kicker">档案校准</p>
                <h3>局外增强</h3>
              </div>
              <strong id="metaSummary">碎片 0</strong>
            </div>
            <div id="metaProgression" class="meta-grid"></div>
          </div>
          <div id="startActions" class="start-actions"></div>
          <div>
            <p class="event-kicker">章节练习</p>
            <div id="chapterSelect" class="chapter-select"></div>
          </div>
        </aside>

        <aside id="storyPanel" class="story-panel hidden" aria-modal="true">
          <div id="storyAvatarFrame" class="story-portrait" aria-hidden="true">
            <img id="storyAvatar" alt="" />
            <span id="storyAvatarFallback">安</span>
          </div>
          <div class="story-dialogue">
            <div class="story-meta">
              <p id="storySpeaker" class="event-kicker">安渡</p>
              <span id="storyProgress"></span>
            </div>
            <h2 id="storyTitle">凌晨 03:32</h2>
            <p id="storyText"></p>
            <p id="storyContinue" class="story-continue">点击继续</p>
            <div id="storyChoices" class="choice-grid"></div>
          </div>
        </aside>

        <aside id="eventPanel" class="event-panel hidden" aria-modal="true">
          <p id="eventKicker" class="event-kicker">异常弹幕</p>
          <h2 id="eventTitle">同事头顶冒出弹幕</h2>
          <p id="eventText"></p>
          <div id="eventChoices" class="choice-grid"></div>
        </aside>

        <aside id="upgradePanel" class="event-panel hidden" aria-modal="true">
          <p id="upgradeKicker" class="event-kicker">变量祝福</p>
          <h2 id="upgradeTitle">选择一个升级方向</h2>
          <div id="upgradeChoices" class="choice-grid"></div>
        </aside>

        <aside id="resultPanel" class="event-panel hidden" aria-modal="true">
          <p id="resultKicker" class="event-kicker">今日结算</p>
          <h2 id="resultTitle"></h2>
          <p id="resultText"></p>
          <div id="resultStats" class="result-stats"></div>
          <div id="resultInsights" class="result-insights"></div>
          <button id="restartButton" class="choice-button primary">重开夜巡</button>
        </aside>
        <aside id="pausePanel" class="system-panel hidden" aria-modal="true">
          <p class="event-kicker">系统暂停</p>
          <h2>夜巡已暂停</h2>
          <p id="pauseSummary"></p>
          <div class="system-choice-grid">
            <button id="resumeButton" class="choice-button primary" type="button">
              <span class="choice-title">继续夜巡</span>
              <span class="choice-effect">回到当前战斗和探索</span>
            </button>
            <button id="pauseSettingsButton" class="choice-button" type="button">
              <span class="choice-title">打开设置</span>
              <span class="choice-effect">调整全屏、震动和手柄输入</span>
            </button>
            <button id="returnMenuButton" class="choice-button danger" type="button">
              <span class="choice-title">回到档案柜</span>
              <span class="choice-effect">保存当前跑局并返回开始界面</span>
            </button>
          </div>
        </aside>

        <aside id="settingsPanel" class="system-panel hidden" aria-modal="true">
          <p class="event-kicker">Steam 准备项</p>
          <h2>系统设置</h2>
          <div class="settings-grid">
            <label class="setting-row">
              <span>
                <strong>屏幕震动</strong>
                <small>关闭后保留战斗反馈，但不再抖动画面</small>
              </span>
              <input id="shakeToggle" type="checkbox" />
            </label>
            <label class="setting-row">
              <span>
                <strong>手柄输入</strong>
                <small>左摇杆移动、A 修复、B 闪避、Start 暂停</small>
              </span>
              <input id="gamepadToggle" type="checkbox" />
            </label>
            <label class="setting-row">
              <span>
                <strong>输入提示</strong>
                <small>在 HUD 显示当前使用键鼠或手柄</small>
              </span>
              <input id="inputHintToggle" type="checkbox" />
            </label>
            <label class="setting-row">
              <span>
                <strong>全屏启动偏好</strong>
                <small>网页版需点击全屏按钮，桌面版后续会自动应用</small>
              </span>
              <input id="fullscreenPrefToggle" type="checkbox" />
            </label>
            <label class="setting-row">
              <span>
                <strong>静音</strong>
                <small>关闭 UI、战斗提示和 Boss 警报音效</small>
              </span>
              <input id="audioMuteToggle" type="checkbox" />
            </label>
            <label class="setting-row range-setting">
              <span>
                <strong>总音量</strong>
                <small>控制当前 WebAudio 合成音效，后续 BGM 也会接入</small>
              </span>
              <span class="range-control">
                <input id="masterVolumeSlider" type="range" min="0" max="100" step="1" />
                <small id="masterVolumeValue" class="volume-value">62%</small>
              </span>
            </label>
          </div>
          <div class="system-choice-grid compact">
            <button id="audioTestButton" class="choice-button" type="button">
              <span class="choice-title">试听音效</span>
              <span class="choice-effect">测试当前音量与静音设置</span>
            </button>
            <button id="settingsFullscreenButton" class="choice-button" type="button">
              <span class="choice-title">切换全屏</span>
              <span class="choice-effect">适配 Steam Deck / 客厅模式</span>
            </button>
            <button id="settingsCloseButton" class="choice-button primary" type="button">
              <span class="choice-title">完成</span>
              <span class="choice-effect">保存设置并返回</span>
            </button>
          </div>
        </aside>
      </section>

      <footer class="ticker">
        <span id="logLine">凌晨 03:32，安渡从键盘上醒来。</span>
      </footer>
    </main>

    <script defer src="./src/platform/web-platform.js"></script>
    <script defer src="./src/audio/synth-audio.js"></script>
    <script defer src="./src/data/game-data.js"></script>
    <script defer src="./src/data/achievement-data.js"></script>
    <script defer src="./src/main.js"></script>
  </body>
</html>
